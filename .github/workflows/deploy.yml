name: Deploy

on:
  push:
    branches: [main]

# Prevent concurrent deploys
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

jobs:
  # Gate: only deploy if CI passes
  ci-check:
    name: Verify CI
    runs-on: ubuntu-latest
    steps:
      - name: CI must pass first
        run: echo "Deploy triggered — CI jobs run in parallel via ci.yml"

  deploy-proxy:
    name: Deploy Proxy (Railway)
    runs-on: ubuntu-latest
    needs: [ci-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service x402guard-proxy --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # Dashboard deploys automatically via Vercel Git Integration
  # No GitHub Action needed — Vercel watches the repo directly.
  # This job just verifies the deploy succeeded.
  verify-dashboard:
    name: Verify Dashboard (Vercel)
    runs-on: ubuntu-latest
    needs: [ci-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Wait for Vercel deploy
        run: sleep 60

      - name: Health check dashboard
        run: |
          DASHBOARD_URL="${{ vars.DASHBOARD_URL }}"
          if [ -z "$DASHBOARD_URL" ]; then
            echo "DASHBOARD_URL not set — skipping health check"
            exit 0
          fi
          curl --fail --retry 5 --retry-delay 10 "$DASHBOARD_URL" || exit 1
          echo "Dashboard is live at $DASHBOARD_URL"

  verify-proxy:
    name: Verify Proxy Health
    runs-on: ubuntu-latest
    needs: [deploy-proxy]
    steps:
      - name: Health check proxy
        run: |
          PROXY_URL="${{ vars.PROXY_PUBLIC_URL }}"
          if [ -z "$PROXY_URL" ]; then
            echo "PROXY_PUBLIC_URL not set — skipping health check"
            exit 0
          fi
          curl --fail --retry 10 --retry-delay 10 "$PROXY_URL/api/v1/health" || exit 1
          echo "Proxy is live at $PROXY_URL"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitLeaks - Scan for hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check .gitignore compliance
        run: |
          echo "Verifying sensitive files are gitignored..."
          for f in .env .env.local .env.production dashboard/.env.local; do
            git check-ignore -q "$f" 2>/dev/null && echo "OK: $f is gitignored" || echo "WARNING: $f NOT in gitignore"
          done

  rust:
    name: Rust (check / test / clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  solana:
    name: Solana (cargo check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solana
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            solana/target
          key: ${{ runner.os }}-solana-cargo-${{ hashFiles('solana/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-solana-cargo-

      - name: cargo check --lib
        run: cargo check --lib

  dashboard:
    name: Dashboard (next build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Build Next.js dashboard
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "http://localhost:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-for-ci"
          NEXT_PUBLIC_PROXY_URL: "http://localhost:3402"

  dashboard-e2e:
    name: Dashboard (E2E tests)
    runs-on: ubuntu-latest
    needs: [dashboard]
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test
        env:
          DEV_SKIP_AUTH: "true"
          NEXT_PUBLIC_SUPABASE_URL: "http://localhost:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-for-ci"
          NEXT_PUBLIC_PROXY_URL: "http://localhost:3402"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dashboard/test-results/
          retention-days: 7

  examples-ts:
    name: Examples (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install and build @x402guard/core
        working-directory: examples/core
        run: |
          npm install
          npx tsc --noEmit
          npx tsup
          npx vitest run

      - name: Install and test @elizaos/plugin-x402guard
        working-directory: examples/elizaos
        run: |
          npm install
          npx tsc --noEmit
          npx vitest run

      - name: Install and test @x402guard/cod3x-adapter
        working-directory: examples/cod3x
        run: |
          npm install
          npx tsc --noEmit
          npx vitest run

  examples-python:
    name: Examples (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and test x402guard-game-plugin
        working-directory: examples/virtuals
        run: |
          pip install -e ".[dev]"
          python -m pytest tests/unit/ -x -v

  examples-integration:
    name: Examples (Integration)
    runs-on: ubuntu-latest
    needs: [examples-ts, examples-python]
    if: vars.X402GUARD_INTEGRATION == '1'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: x402guard
          POSTGRES_PASSWORD: x402guard
          POSTGRES_DB: x402guard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and start x402Guard proxy
        run: |
          docker compose up -d proxy
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:3402/api/v1/health

      - name: Run TypeScript integration tests
        working-directory: examples/elizaos
        env:
          X402GUARD_INTEGRATION: "1"
          X402GUARD_PROXY_URL: "http://localhost:3402"
        run: |
          npm install
          npx vitest run tests/integration/

      - name: Run Python integration tests
        working-directory: examples/virtuals
        env:
          X402GUARD_INTEGRATION: "1"
          X402GUARD_PROXY_URL: "http://localhost:3402"
        run: |
          pip install -e ".[dev]"
          python -m pytest tests/integration/ -x -v

name: Bug Report
description: Report a bug in x402Guard
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
        **For security vulnerabilities, please see [SECURITY.md](../../SECURITY.md) instead.**

  - type: input
    id: component
    attributes:
      label: Component
      description: Which part of x402Guard is affected?
      placeholder: "e.g. proxy, dashboard, solana, examples/core"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Create an agent via POST /api/v1/agents
        2. Add a MaxSpendPerTx rule
        3. Send a payment exceeding the limit
        4. Observe...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version, OS, deployment method, etc.
      placeholder: |
        - x402Guard version: v0.1.0
        - Deployment: Docker / Railway / local
        - OS: Ubuntu 22.04
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output (redact secrets!).
      render: shell
    validations:
      required: false
